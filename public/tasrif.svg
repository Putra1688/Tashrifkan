<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Gelap Minimalis -->
  <rect width="512" height="512" rx="128" fill="#0f172a"/>

  <!-- Lingkaran Aksen Halus di Tengah -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1e293b" stroke-width="8"/>

  <!-- Teks Kaligrafi Arab "Tashrif" Modern -->
  <text 
    x="50%" 
    y="55%" 
    font-family="Arial, Montserrat, sans-serif" 
    font-size="110" 
    font-weight="bold"
    fill="#34d399" 
    text-anchor="middle" 
    dominant-baseline="middle"
  >
    تَصْرِيف
  </text>

  <!-- Garis Minimalis di Bawah Teks (Simbol Slider/Horizontal) -->
  <line x1="160" y1="340" x2="352" y2="340" stroke="#fbbf24" stroke-width="6" stroke-linecap="round"/>
</svg>
